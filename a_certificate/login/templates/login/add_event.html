<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>user_dash</title>

  {% load static %} <!-- ✅ for images -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 70px 0 0 0;
      width: 100%;
    }

    /* ================= SIDEBAR ================= */
    #sidebar {
      position: fixed;
      top: 70px;
      /* ✅ fixed */
      left: 0;
      width: 250px;
      height: calc(100vh - 70px);
      /* ✅ fixed */
      background-color: #670626;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1050;
      overflow-y: auto;
    }


    #sidebar.show {
      transform: translateX(0);
    }

    /* ================= IMAGE SLIDER ================= */
    #image_column {
      height: 380px;
      width: 100vw;
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .manual_text {
      margin-left: 50px;
    }

    .manual_text h1 {
      font-size: 35px;
      color: #210a12;
      text-align: center;
    }

    .manual_text p {
      font-size: 20px;
      color: #3b1120;
      text-align: left;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {
      #sidebar {
        width: 220px;
      }

      #image_column {
        height: 105px;
      }

      .manual_text {
        margin-left: 0;
        padding: 15px;
        text-align: center;
      }

      .manual_text h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar fixed-top navbar-dark" style="background-color: #670626">
    <div class="container-fluid">

      <div class="d-flex align-items-center gap-2">
        <button class="navbar-toggler" id="toggleSidebar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <h2 style="font-size: 20px; color: beige; font-family: cursive;">A_Certificates</h2>
        <!-- ✅ fixed static path -->
        <img src="{% static 'photo/black.png' %}" style="width:60px;" alt="logo">
      </div>

    </div>
  </nav>

  <!-- ================= SIDEBAR ================= -->
  <div id="sidebar">
    <div class="p-3 border-bottom d-flex justify-content-end">
      <button class="btn-close btn-close-white" id="closeSidebar"></button>
    </div>

    <ul class="navbar-nav px-3">
      <!-- ✅ fixed links -->
      <h2 style="color: wheat;">Admin Dashboard</h2>

      <li><a href="/admin/" style="text-decoration: none; font-size: 20px; color: wheat;">Admin</a></li>
      <li><a href="{% url 'add_event' %}" style="text-decoration: none; font-size: 20px; color: wheat;">Events</a></li>
      <li><a href="{% url 'add_participant' %}" style="text-decoration: none; font-size: 20px; color: wheat;">Participants</a></li>
            <li><a href="{% url 'generate_certificate' %}"  style="text-decoration: none; font-size: 20px; color: wheat;">Certificates</a></li>
    </ul>
  </div>

  <!-- ================= MAIN ================= -->
  <main class="content-wrapper">

    <div id="image_column"></div>

    <div class="manual_text">
      <div class="container mt-4">
        <h2>Add Event</h2>
        <br>
        <form method="POST">
          {% csrf_token %}

          <input type="text" name="name" class="form-control mb-2" placeholder="Event Name">

          <br> <input type="date" name="date" class="form-control mb-2">

          <br> <input type="text" name="organizer" class="form-control mb-2" placeholder="Organizer Name">

          <br> <input type="text" name="certificate_title" class="form-control mb-2" placeholder="Certificate Title">

          <br> <button class="btn btn-primary">Add Event</button>

          <br>
          <br>
          <br>
        </form>
      </div>
    </div>

  </main>

  <!-- ================= SCRIPT ================= -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebar');
    const closeBtn = document.getElementById('closeSidebar');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('show');
    });

    closeBtn.addEventListener('click', () => {
      sidebar.classList.remove('show');
    });

    // slideshow
    function startSlideshow() {
      var img = [
        "{% static 'photo/1.jpg' %}",
        "{% static 'photo/2.jpg' %}"
      ];

      var index = 0;
      var box = document.getElementById("image_column");

      function changeImage() {
        box.style.backgroundImage = "url('" + img[index] + "')";
        index = (index + 1) % img.length;
      }

      changeImage();
      setInterval(changeImage, 3000);
    }

    window.onload = startSlideshow;
  </script>

</body>

</html>
